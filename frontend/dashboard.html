<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gym Admin Dashboard — GymCoach Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0714; --fg: #f8fafc; --muted: #94a3b8; --card: #150f24;
  --border: rgba(139,92,246,.18); --primary: #a855f7; --primary-2: #6366f1;
  --danger: #f87171; --success: #4ade80;
  --grad-primary: linear-gradient(135deg, #a855f7, #6366f1);
  --grad-hero: linear-gradient(135deg, #a855f7 0%, #8b5cf6 45%, #6366f1 100%);
  --grad-heading: linear-gradient(135deg, #c084fc, #818cf8);
  --shadow-glow: 0 18px 50px -18px rgba(139,92,246,.55);
  --shadow-card: 0 12px 40px -22px rgba(0,0,0,.6);
  --radius: 16px;
}
* { box-sizing: border-box; }
body { margin:0; font-family:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--fg); min-height:100vh; position:relative; overflow-x:hidden; }
.blobs { position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }
.blob { position:absolute; border-radius:50%; filter:blur(80px); }
.blob.a { width:380px; height:380px; top:-90px; left:-90px; background:var(--grad-hero); opacity:.22; }
.blob.b { width:460px; height:460px; top:160px; right:-130px; background:var(--grad-primary); opacity:.16; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.topnav { display:flex; align-items:center; justify-content:space-between; padding:16px 32px; border-bottom:1px solid var(--border); }
.topnav .logo { display:flex; align-items:center; gap:10px; font-weight:800; font-size:17px; }
.logo-icon { width:34px; height:34px; border-radius:10px; background:var(--grad-primary); display:flex; align-items:center; justify-content:center; font-size:16px; }
.logout-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:8px 16px; border-radius:10px; cursor:pointer; font-size:13px; font-weight:600; }
.logout-btn:hover { color:var(--fg); border-color:rgba(139,92,246,.4); }

.wrap { max-width:1000px; margin:0 auto; padding:32px 20px 60px; }
h1 { font-family:'Baloo 2',cursive; font-size:1.8rem; font-weight:800; margin:0 0 24px; background:var(--grad-heading); -webkit-background-clip:text; background-clip:text; color:transparent; }

.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:32px; }
@media (max-width:700px) { .stats-grid { grid-template-columns:repeat(2,1fr); } }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both; }
.stat-card .num { font-size:1.6rem; font-weight:800; color:#c4b5fd; }
.stat-card .label { font-size:12px; color:var(--muted); font-weight:600; margin-top:4px; }

.card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:22px; margin-bottom:24px; box-shadow:var(--shadow-card); animation:fadeUp .55s cubic-bezier(.16,1,.3,1) both; }
.card-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.card-head h3 { margin:0; font-size:1rem; }

.grid.c3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
@media (max-width:600px) { .grid.c3 { grid-template-columns:1fr; } }
label.lbl { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; }
input { width:100%; padding:9px 12px; font-size:14px; color:var(--fg); border:1px solid var(--border); border-radius:10px; background:#0f0a1c; outline:none; font-family:inherit; }
input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(168,85,247,.2); }
button.primary { padding:9px 18px; border:none; border-radius:10px; background:var(--grad-primary); color:#fff; font-weight:700; font-size:13px; cursor:pointer; box-shadow:var(--shadow-glow); }
button.primary:disabled { opacity:.6; cursor:not-allowed; }

.code-result { display:none; margin-top:14px; background:rgba(74,222,128,.1); border:1px solid rgba(74,222,128,.35); border-radius:10px; padding:12px 16px; font-size:13px; }
.code-result b { color:var(--success); font-size:1.1rem; letter-spacing:2px; }

table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; color:var(--muted); font-weight:600; padding:8px 10px; border-bottom:1px solid var(--border); font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
td { padding:10px; border-bottom:1px solid var(--border); }
tr:hover td { background:rgba(139,92,246,.05); }
.code-pill { font-family:monospace; background:#0f0a1c; padding:3px 8px; border-radius:6px; letter-spacing:1px; }
.status-pill { font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; }
.status-pill.active { background:rgba(74,222,128,.15); color:var(--success); }
.empty { color:var(--muted); font-size:13px; text-align:center; padding:20px; }
</style>
</head>
<body>
<div class="blobs"><div class="blob a"></div><div class="blob b"></div></div>

<div class="topnav">
  <div class="logo"><div class="logo-icon">🏋</div>GymCoach Studio — Admin</div>
  <button class="logout-btn" onclick="logout()">Log Out</button>
</div>

<div class="wrap">
  <h1>Dashboard</h1>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="num" id="statTotalMembers">—</div><div class="label">Total Members</div></div>
    <div class="stat-card"><div class="num" id="statTodayLogins">—</div><div class="label">Today's Logins</div></div>
    <div class="stat-card"><div class="num" id="statActive">—</div><div class="label">Active Members</div></div>
    <div class="stat-card"><div class="num" id="statExpiring">—</div><div class="label">Expiring Memberships</div></div>
    <div class="stat-card"><div class="num" id="statPending">—</div><div class="label">Pending Renewals</div></div>
    <div class="stat-card"><div class="num" id="statRevenue">—</div><div class="label">Today's Revenue</div></div>
  </div>

  <div class="card">
    <div class="card-head"><h3>Add Member</h3></div>
    <form id="addMemberForm" class="grid c3">
      <div>
        <label class="lbl">Name</label>
        <input type="text" id="memberName" required placeholder="Full name" />
      </div>
      <div>
        <label class="lbl">Phone Number</label>
        <input type="tel" id="memberPhone" required placeholder="9999999999" />
      </div>
      <div>
        <label class="lbl">Email (Optional)</label>
        <input type="email" id="memberEmail" placeholder="member@example.com" />
      </div>
      <div style="grid-column: 1 / -1;">
        <button type="submit" class="primary" id="addMemberBtn">Save Member</button>
      </div>
    </form>
    <div class="code-result" id="codeResult">
      Login code generated: <b id="codeValue"></b>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><h3>Members</h3></div>
    <table>
      <thead>
        <tr><th>Name</th><th>Phone</th><th>Login Code</th><th>Status</th></tr>
      </thead>
      <tbody id="membersTableBody">
        <tr><td colspan="4" class="empty">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const API_BASE = "https://ai-project-gym-dashboard.onrender.com";
const token = localStorage.getItem("admin_token");

if (!token) window.location.href = "/login.html";

function authHeaders() {
  return { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" };
}

function logout() {
  localStorage.removeItem("admin_token");
  localStorage.removeItem("admin_role");
  localStorage.removeItem("admin_gym_id");
  window.location.href = "/login.html";
}

async function loadDashboard() {
  const res = await fetch(`${API_BASE}/admin/dashboard`, { headers: authHeaders() });
  if (res.status === 401 || res.status === 403) return logout();
  const data = await res.json();
  document.getElementById("statTotalMembers").textContent = data.total_members;
  document.getElementById("statTodayLogins").textContent = data.todays_logins;
  document.getElementById("statActive").textContent = data.active_members;
  document.getElementById("statExpiring").textContent = data.expiring_memberships;
  document.getElementById("statPending").textContent = data.pending_renewals;
  document.getElementById("statRevenue").textContent = "₹" + data.todays_revenue;
}

async function loadMembers() {
  const res = await fetch(`${API_BASE}/admin/members`, { headers: authHeaders() });
  if (res.status === 401 || res.status === 403) return logout();
  const data = await res.json();
  const tbody = document.getElementById("membersTableBody");

  if (!data.members.length) {
    tbody.innerHTML = `<tr><td colspan="4" class="empty">No members yet — add your first one above.</td></tr>`;
    return;
  }

  tbody.innerHTML = data.members.map(m => `
    <tr>
      <td>${m.name}</td>
      <td>${m.phone}</td>
      <td><span class="code-pill">${m.login_code}</span></td>
      <td><span class="status-pill active">${m.status}</span></td>
    </tr>
  `).join("");
}

document.getElementById("addMemberForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("addMemberBtn");
  btn.disabled = true;
  btn.textContent = "Saving...";

  try {
    const res = await fetch(`${API_BASE}/admin/members`, {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({
        name: document.getElementById("memberName").value,
        phone: document.getElementById("memberPhone").value,
        email: document.getElementById("memberEmail").value || null,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Could not add member");

    document.getElementById("codeValue").textContent = data.login_code;
    document.getElementById("codeResult").style.display = "block";
    document.getElementById("addMemberForm").reset();

    await loadMembers();
    await loadDashboard();
  } catch (err) {
    alert(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "Save Member";
  }
});

loadDashboard();
loadMembers();
</script>
</body>
</html>
