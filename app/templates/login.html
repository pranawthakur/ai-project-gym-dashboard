<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gym Admin Login — GymCoach Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0714; --fg: #f8fafc; --muted: #94a3b8; --card: #150f24;
  --border: rgba(139,92,246,.18); --primary: #a855f7; --primary-2: #6366f1;
  --danger: #f87171; --success: #4ade80;
  --grad-primary: linear-gradient(135deg, #a855f7, #6366f1);
  --grad-hero: linear-gradient(135deg, #a855f7 0%, #8b5cf6 45%, #6366f1 100%);
  --grad-heading: linear-gradient(135deg, #c084fc, #818cf8);
  --shadow-glow: 0 18px 50px -18px rgba(139,92,246,.55);
  --shadow-card: 0 12px 40px -22px rgba(0,0,0,.6);
  --radius: 16px;
}
* { box-sizing: border-box; }
body { margin:0; font-family:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--fg); min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.blobs { position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }
.blob { position:absolute; border-radius:50%; filter:blur(80px); }
.blob.a { width:380px; height:380px; top:-90px; left:-90px; background:var(--grad-hero); opacity:.28; animation:float1 14s ease-in-out infinite; }
.blob.b { width:460px; height:460px; top:160px; right:-130px; background:var(--grad-primary); opacity:.2; animation:float2 18s ease-in-out infinite; }
@keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(14px,-26px)} }
@keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-18px,22px)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.card { width:100%; max-width:380px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:32px 28px; box-shadow:var(--shadow-card); animation:fadeUp .55s cubic-bezier(.16,1,.3,1) both; }
.logo { display:flex; align-items:center; gap:10px; margin-bottom:22px; }
.logo-icon { width:38px; height:38px; border-radius:10px; background:var(--grad-primary); display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow:0 8px 22px -8px rgba(139,92,246,.6); }
.logo b { font-family:'Baloo 2',cursive; font-weight:800; font-size:18px; }
h1 { font-size:1.4rem; font-weight:800; margin:0 0 4px; background:var(--grad-heading); -webkit-background-clip:text; background-clip:text; color:transparent; }
p.sub { color:var(--muted); font-size:13px; margin:0 0 22px; }
label.lbl { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; margin-top:14px; }
input { width:100%; padding:10px 12px; font-size:14px; color:var(--fg); border:1px solid var(--border); border-radius:10px; background:#0f0a1c; outline:none; transition:border-color .2s, box-shadow .2s; font-family:inherit; }
input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(168,85,247,.2); }
button.submit { width:100%; margin-top:22px; padding:11px; border:none; border-radius:10px; background:var(--grad-primary); color:#fff; font-weight:700; font-size:14px; cursor:pointer; box-shadow:var(--shadow-glow); transition:transform .15s; }
button.submit:hover { transform:translateY(-1px); }
button.submit:disabled { opacity:.6; cursor:not-allowed; transform:none; }
.error { color:var(--danger); font-size:13px; margin-top:12px; display:none; }
</style>
</head>
<body>
<div class="blobs"><div class="blob a"></div><div class="blob b"></div></div>

<div class="card">
  <div class="logo"><div class="logo-icon">🏋</div><b>GymCoach Studio</b></div>
  <h1>Gym Admin Login</h1>
  <p class="sub">Sign in to manage your gym.</p>

  <form id="loginForm">
    <label class="lbl">Email</label>
    <input type="email" id="email" required placeholder="admin@yourgym.com" />

    <label class="lbl">Password</label>
    <input type="password" id="password" required placeholder="••••••••" />

    <button type="submit" class="submit" id="submitBtn">Log In</button>
    <p class="error" id="errorMsg"></p>
  </form>

  <p style="text-align:center; margin:16px 0 0; font-size:12px;">
    <a href="#" id="toggleSignup" style="color:var(--muted); text-decoration:underline;">Dev only — create a test gym + admin</a>
  </p>

  <form id="signupForm" style="display:none; margin-top:8px; padding-top:18px; border-top:1px solid var(--border);">
    <label class="lbl">Gym Name</label>
    <input type="text" id="signupGymName" required placeholder="Test Gym" />

    <label class="lbl">Admin Email</label>
    <input type="email" id="signupEmail" required placeholder="you@example.com" />

    <label class="lbl">Admin Password</label>
    <input type="password" id="signupPassword" required placeholder="••••••••" />

    <button type="submit" class="submit" id="signupBtn" style="background:transparent; border:1px solid var(--border); box-shadow:none;">Create Gym + Admin</button>
    <p class="error" id="signupError"></p>
  </form>
</div>

<script>
const API_BASE = "https://ai-project-gym-dashboard.onrender.com";

document.getElementById("toggleSignup").addEventListener("click", (e) => {
  e.preventDefault();
  const form = document.getElementById("signupForm");
  form.style.display = form.style.display === "none" ? "block" : "none";
});

document.getElementById("signupForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("signupBtn");
  const errorMsg = document.getElementById("signupError");
  errorMsg.style.display = "none";
  btn.disabled = true;
  btn.textContent = "Creating...";

  try {
    const res = await fetch(`${API_BASE}/admin/signup`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        gym_name: document.getElementById("signupGymName").value,
        admin_email: document.getElementById("signupEmail").value,
        admin_password: document.getElementById("signupPassword").value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Signup failed");

    localStorage.setItem("admin_token", data.access_token);
    localStorage.setItem("admin_role", data.role);
    localStorage.setItem("admin_gym_id", data.gym_id || "");
    window.location.href = "/dashboard.html";
  } catch (err) {
    errorMsg.textContent = err.message;
    errorMsg.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = "Create Gym + Admin";
  }
});

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  const errorMsg = document.getElementById("errorMsg");
  errorMsg.style.display = "none";
  btn.disabled = true;
  btn.textContent = "Logging in...";

  try {
    const res = await fetch(`${API_BASE}/admin/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
      }),
    });
    const data = await res.json();

    if (!res.ok) throw new Error(data.detail || "Login failed");

    localStorage.setItem("admin_token", data.access_token);
    localStorage.setItem("admin_role", data.role);
    localStorage.setItem("admin_gym_id", data.gym_id || "");
    window.location.href = "/dashboard.html";
  } catch (err) {
    errorMsg.textContent = err.message;
    errorMsg.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = "Log In";
  }
});
</script>
</body>
</html>
